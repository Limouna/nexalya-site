    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: #0f0f23;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Gradient orbs — same as main site */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7143fe;
            top: -10%;
            right: -5%;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #2e0a52;
            bottom: -10%;
            left: -5%;
            animation-delay: -7s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -20px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* Main content */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 560px;
            width: 90%;
            padding: 56px 40px;
            background: rgba(26, 26, 46, 0.7);
            border: 1px solid rgba(113, 67, 254, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Logo */
        .logo {
            margin-bottom: 40px;
        }

        .logo a {
            display: inline-block;
        }

        .logo svg {
            width: 170px;
            height: auto;
        }

        /* Checkmark icon */
        .check-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7143fe, #2e0a52);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        .check-circle svg {
            width: 32px;
            height: 32px;
            stroke: #fff;
            stroke-width: 2.5;
            fill: none;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #7143fe, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message {
            font-size: 16px;
            line-height: 1.7;
            color: #a5b4fc;
            margin-bottom: 36px;
            font-weight: 300;
        }

        /* CTA button */
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #7143fe, #2e0a52);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(113, 67, 254, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
                border-radius: 16px;
            }

            .logo svg {
                width: 140px;
            }

            h1 {
                font-size: 22px;
            }

            .message {
                font-size: 15px;
            }

            .check-circle {
                width: 60px;
                height: 60px;
                margin-bottom: 22px;
            }

            .check-circle svg {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>
